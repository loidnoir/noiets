name: Noiets
options:
  bundleIdPrefix: com.noiets
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  NoietsKit:
    path: Packages/NoietsKit

targets:
  Noiets:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: NoietsKit
        products:
          - EditorKit
          - RenderKit
          - VimKit
          - MarkdownKit
          - IndexKit
          - VaultStore
          - SharedModel
    settings:
      base:
        PRODUCT_NAME: Noiets
        PRODUCT_BUNDLE_IDENTIFIER: com.noiets.Noiets
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        DEAD_CODE_STRIPPING: YES
    scheme:
      testTargets: []
