name: Noiets
options:
  bundleIdPrefix: com.noiets
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  NoietsKit:
    path: Packages/NoietsKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Noiets:
    type: application
    platform: macOS
    sources:
      - App
      - path: App/Resources
        buildPhase: resources
    dependencies:
      - package: NoietsKit
        products:
          - EditorKit
          - RenderKit
          - VimKit
          - MarkdownKit
          - IndexKit
          - VaultStore
          - SharedModel
      - package: Sparkle
    info:
      path: App/Info.plist
      properties:
        # Sparkle auto-update: the feed always points at the newest GitHub
        # release's appcast.xml (the /latest/download URL is stable).
        SUFeedURL: https://github.com/loidnoir/noites/releases/latest/download/appcast.xml
        SUPublicEDKey: s4IvLrN8q7QPy2yRDcx+D3B0bz1u1mXOiONI6Cl6xZo=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_NAME: Noiets
        PRODUCT_BUNDLE_IDENTIFIER: com.noiets.Noiets
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        DEAD_CODE_STRIPPING: YES
    scheme:
      testTargets: []
